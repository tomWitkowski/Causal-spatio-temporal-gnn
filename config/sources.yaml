# Per-source configuration. `enabled: false` skips the source in `fetch all`.

spatial_grid:
  enabled: true
  # Overrides kozy.yaml spatial.n_points when set
  n_points: 50

open_meteo:
  enabled: true
  # ERA5 reanalysis hourly variables
  hourly:
    - temperature_2m
    - relative_humidity_2m
    - precipitation
    - rain
    - snowfall
    - surface_pressure
    - cloud_cover
    - wind_speed_10m
    - wind_direction_10m
    - wind_gusts_10m
    - soil_moisture_0_to_7cm
    - soil_temperature_0_to_7cm

gios_air:
  enabled: true
  max_stations: 3        # nearest stations; GIOŚ getData is slow, keep it small
  search_radius_km: 30

gus_bdl:
  enabled: true
  # BDL variable IDs at gmina level (level 6):
  # 72305=ludność ogółem, 60559=gęstość (os/km2)
  # 60562/60563=obciążenie dem., 60565/60566/60567=grupy wieku
  # 60572/60573=pow. użytkowa mieszkań
  variable_ids: [72305, 60559, 60562, 60563, 60565, 60566, 60567, 60572, 60573]

osm_overpass:
  enabled: true
  overpass_url: "https://overpass-api.de/api/interpreter"
  features:
    - "amenity"
    - "shop"
    - "highway"
    - "building"
    - "waterway"
    - "landuse"
    - "natural"

imgw_warnings:
  enabled: true
  # IMGW hydrological warnings (TXT archive, history since 2017) + PNZH hydro
  # forecast (live). Filtered to the upper-Vistula/Beskidy/śląskie basins of Kozy.
  # Meteo warnings -> meteoalarm; road/meteo hazard forecasts are PDF-only (skipped).

meteoalarm:
  enabled: true
  # IMGW-issued CAP weather warnings via Meteoalarm for powiat bielski (PL2402)
  # No historical archive — accumulates from first run forward

imgw_meteo:
  enabled: true
  base: "https://danepubliczne.imgw.pl/data/dane_pomiarowo_obserwacyjne"
  # PSZCZYNA (~18 km) is the only klimat station in range;
  # BIELSKO-BIAŁA / ŻYWIEC require kind=synop
  station_names: ["PSZCZYNA"]
  kind: "klimat"   # klimat | synop | opad

imgw_hydro:
  enabled: true
  station_names: ["PODKĘPIE", "MIKUSZOWICE", "CZECHOWICE-DZIEDZICE", "CZANIEC-KOBIERNICE"]

psp_events:
  enabled: true

sewik_accidents:
  enabled: true

gugik:
  enabled: true

tauron_outages:
  enabled: true

rcb_alerts:
  enabled: true
  base: "https://www.gov.pl/web/rcb"

kozy_news:
  enabled: true
  base: "https://kozy.pl/aktualnosci/"
